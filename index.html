<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Profile Card</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="profileCard">
      <img src="https://i.ibb.co/VWwPz9sj/image-placeholder.webp" id="profileImage" alt="newImage">
      
      <h2 id="profileName">John Doe</h2>

      <h3 class="active-status">Status: Active</h3>
      
      <p id="profileRole">Software Developer</p>
      
      <p id="profileBio">Passionate about coding and learning new technologies</p> 

      <div class="buttons">
         <button id="updateNameBtn">Update Name</button>
         <button id="updateRoleBtn">Update Role</button>
         <button id="toggleStatusBtn">Toggle Active Status</button> 
         <button id="changeImageBtn">Change Image</button>
      </div> 
      
    </div>

    <script src="./script.js"></script>
</body>
</html>
